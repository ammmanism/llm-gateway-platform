name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: pip install httpx
    - name: Run benchmarks
      run: python benchmarks/throughput.py
